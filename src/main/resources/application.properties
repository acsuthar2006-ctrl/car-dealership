# ============================================================
# Common config — shared across ALL profiles
# ============================================================
spring.application.name=car-dealership

# Context path — all endpoints under /api/v1
server.port=8080
server.servlet.context-path=/api/v1

# JPA — let Flyway handle schema (never let Hibernate auto-create in prod)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT config — override secret in environment, never hardcode
app.jwt.secret=${JWT_SECRET:local-dev-secret-key-change-in-production-must-be-256-bits-long}
app.jwt.expiration-ms=86400000
