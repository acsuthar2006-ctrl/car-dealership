# ============================================================
# Common config — shared across ALL profiles
# ============================================================
spring.application.name=car-dealership

# Context path — all endpoints under /api/v1
server.port=8080
server.servlet.context-path=/api/v1

# JPA — let Flyway handle schema (never let Hibernate auto-create in prod)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT config — override secret in environment, never hardcode
app.jwt.secret=${JWT_SECRET:bG9jYWwtZGV2LXNlY3JldC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24tbXVzdC1iZS0yNTYtYml0cy1sb25n}
app.jwt.expiration-ms=86400000

# H2 Database Config
spring.datasource.url=jdbc:h2:mem:dealershipdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
